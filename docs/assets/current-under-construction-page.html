<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Designspace — Under Construction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffffff 0%, #e9eef6 100%);
      color: #1a1a1a;
    }

    .container {
      text-align: center;
      max-width: 700px;
      padding: 40px;
    }

    .logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 48px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .logo .design {
      font-weight: 400;
    }

    .logo .space {
      font-weight: 700;
    }

    h1 {
      font-size: 40px;
      margin: 10px 0 20px;
      font-weight: 700;
    }

    p {
      font-size: 18px;
      margin-bottom: 35px;
      color: #444;
    }

    .facebook {
      font-size: 18px;
      color: #1a1a1a;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 3px;
    }
    .facebook:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span class="design">design</span><span class="space">space</span></div>

    <h1>We're Building Something Amazing</h1>
    <p>Our new branding, marketing, and app development website is currently under construction. Stay tuned — it’s going to be beautiful.</p>

    <a class="facebook" href="https://www.facebook.com/designspace.my/" target="_blank">Visit us on Facebook</a>
  </div>
</body>
</html>
